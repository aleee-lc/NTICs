<main class="app-shell">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-b" aria-hidden="true"></div>

  <section class="state-card" *ngIf="appView() === 'loading'">Cargando aplicacion...</section>

  <section class="state-card config-error" *ngIf="appView() === 'config-error'">
    <p class="eyebrow">Configuracion faltante</p>
    <h1>No se pudo iniciar el frontend</h1>
    <p>{{ configError() }}</p>
    <p>
      Verifica que tu backend tenga en <code>.env</code>:
      <code>SUPABASE_URL</code> y <code>SUPABASE_ANON_KEY</code>.
    </p>
  </section>

  <app-landing-page
    *ngIf="appView() === 'landing'"
    (authNavigate)="goToAuth($event)"
  />

  <app-auth-page
    *ngIf="appView() === 'auth'"
    [authView]="authView()"
    [authMessage]="authMessage()"
    [loginEmail]="loginEmail"
    [loginPassword]="loginPassword"
    [registerName]="registerName"
    [registerEmail]="registerEmail"
    [registerPassword]="registerPassword"
    [registerConfirmPassword]="registerConfirmPassword"
    (authViewChange)="setAuthView($event)"
    (loginEmailChange)="loginEmail = $event"
    (loginPasswordChange)="loginPassword = $event"
    (registerNameChange)="registerName = $event"
    (registerEmailChange)="registerEmail = $event"
    (registerPasswordChange)="registerPassword = $event"
    (registerConfirmPasswordChange)="registerConfirmPassword = $event"
    (loginSubmit)="login()"
    (registerSubmit)="createAccount()"
    (passwordReset)="sendPasswordReset()"
  />

  <app-onboarding-page
    *ngIf="appView() === 'onboarding'"
    [onboardingView]="onboardingView()"
    [currentUserInitials]="currentUserInitials()"
    [currentUserName]="currentUserName()"
    [userEmail]="session()?.user?.email ?? ''"
    [organizationsMessage]="organizationsMessage()"
    [newOrgName]="newOrgName"
    [isCreatingFirstOrg]="isCreatingFirstOrg()"
    (onboardingViewChange)="onboardingView.set($event)"
    (logoutClick)="logout()"
    (newOrgNameChange)="newOrgName = $event"
    (createOrganization)="createFirstOrganization()"
    (refreshOrganizations)="refreshOrganizations()"
  />

  <app-workspace-page
    *ngIf="appView() === 'workspace'"
    [activePanel]="activePanel()"
    [isSidebarCollapsed]="isSidebarCollapsed()"
    [searchTerm]="searchTerm()"
    [activeOrganizationId]="activeOrganizationId()"
    [organizations]="organizations()"
    [isOrgCreateDropdownOpen]="isOrgCreateDropdownOpen()"
    [isCreatingOrganization]="isCreatingOrganization()"
    [organizationsMessage]="organizationsMessage()"
    [workspaceNewOrgName]="workspaceNewOrgName"
    [currentUserInitials]="currentUserInitials()"
    [currentUserName]="currentUserName()"
    [userEmail]="session()?.user?.email ?? ''"
    [currentOrganizationRole]="activeOrganization()?.role ?? null"
    [isUserMenuOpen]="isUserMenuOpen()"
    [totalDocuments]="totalDocuments()"
    [inReviewDocuments]="inReviewDocuments()"
    [approvedDocuments]="approvedDocuments()"
    [recentDocuments]="recentDocuments()"
    [documentCategoryFilter]="documentCategoryFilter()"
    [documentStatusFilter]="documentStatusFilter()"
    [categories]="categories()"
    [visibleDocuments]="visibleDocuments()"
    [isLoadingDocumentDetail]="isLoadingDocumentDetail()"
    [selectedDocument]="selectedDocument()"
    [detailTitle]="detailTitle"
    [detailCategoryId]="detailCategoryId"
    [detailDescription]="detailDescription"
    [approvalComments]="approvalComments"
    [versionChangeSummary]="versionChangeSummary"
    [documentsMessage]="documentsMessage()"
    [docTitle]="docTitle"
    [docCategoryId]="docCategoryId"
    [docDescription]="docDescription"
    [docChangeSummary]="docChangeSummary"
    [uploadProgress]="uploadProgress()"
    [uploadMessage]="uploadMessage()"
    [isCategoryFormOpen]="isCategoryFormOpen()"
    [editingCategoryId]="editingCategoryId()"
    [isSavingCategory]="isSavingCategory()"
    [categoryName]="categoryName"
    [categoryDescription]="categoryDescription"
    [filteredCategories]="filteredCategories()"
    [categoryMessage]="categoryMessage()"
    [members]="members()"
    [inviteEmail]="inviteEmail"
    [inviteRole]="inviteRole"
    [membersMessage]="membersMessage()"
    [canManageMembers]="canManageMembers()"
    [canApproveDocuments]="canApproveDocuments()"
    [canWriteDocuments]="canWriteDocuments()"
    [organizationRoleLabel]="workspaceHelpers.organizationRoleLabel"
    [documentAuthorLabel]="workspaceHelpers.documentAuthorLabel"
    [statusClass]="workspaceHelpers.statusClass"
    [statusLabel]="workspaceHelpers.statusLabel"
    [formatFileSize]="workspaceHelpers.formatFileSize"
    [userIdLabel]="workspaceHelpers.userIdLabel"
    [memberDisplayName]="workspaceHelpers.memberDisplayName"
    [categoryTone]="workspaceHelpers.categoryTone"
    [auditActionLabel]="workspaceHelpers.auditActionLabel"
    (panelChange)="openPanel($event)"
    (searchTermChange)="searchTerm.set($event)"
    (organizationChange)="onOrganizationChange($event)"
    (toggleSidebar)="toggleSidebar()"
    (refreshData)="refreshData()"
    (toggleOrgCreateDropdown)="toggleOrgCreateDropdown()"
    (workspaceNewOrgNameChange)="workspaceNewOrgName = $event"
    (createOrganization)="submitWorkspaceOrgCreate()"
    (toggleUserMenu)="toggleUserMenu()"
    (logoutClick)="logout()"
    (openDocumentPreview)="openDocumentPreview($event)"
    (documentCategoryFilterChange)="setDocumentCategoryFilter($event)"
    (documentStatusFilterChange)="setDocumentStatusFilter($event)"
    (clearDocumentFilters)="clearDocumentFilters()"
    (openDocumentDetail)="openDocumentDetail($event)"
    (closeDocumentDetail)="closeDocumentDetail()"
    (detailTitleChange)="detailTitle = $event"
    (detailCategoryIdChange)="detailCategoryId = $event"
    (detailDescriptionChange)="detailDescription = $event"
    (saveDocumentDetail)="saveDocumentDetail()"
    (changeDocumentStatus)="changeDocumentStatus($event)"
    (approvalCommentsChange)="approvalComments = $event"
    (versionFileSelected)="onVersionFileSelected($event)"
    (versionChangeSummaryChange)="versionChangeSummary = $event"
    (uploadDocumentVersion)="uploadDocumentVersion()"
    (openVersionPreview)="openVersionPreview($event)"
    (deleteSelectedDocument)="deleteSelectedDocument()"
    (docTitleChange)="docTitle = $event"
    (docCategoryIdChange)="docCategoryId = $event"
    (docDescriptionChange)="docDescription = $event"
    (docChangeSummaryChange)="docChangeSummary = $event"
    (fileSelected)="onFileSelected($event)"
    (uploadDocument)="uploadDocument()"
    (openCreateCategoryForm)="openCreateCategoryForm()"
    (saveCategory)="saveCategory()"
    (categoryNameChange)="categoryName = $event"
    (categoryDescriptionChange)="categoryDescription = $event"
    (cancelCategoryForm)="cancelCategoryForm()"
    (startEditCategory)="startEditCategory($event)"
    (deleteCategory)="deleteCategory($event)"
    (viewCategoryDocuments)="viewCategoryDocuments($event)"
    (inviteEmailChange)="inviteEmail = $event"
    (inviteRoleChange)="inviteRole = $event"
    (inviteMember)="inviteMember()"
    (updateMemberRole)="updateMemberRole($event.member, $event.role)"
    (removeMember)="removeMember($event)"
  />
</main>
